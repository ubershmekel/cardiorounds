org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compilation crashes when the pub cache and the project
# live on different Windows drive letters (e.g. pub cache on C:, project on E:).
# See the "this and base files have different roots" stack trace.
# Disabling only the *incremental* compiler — full builds still work — sidesteps
# the cross-drive relative-path computation that the incremental cache does.
kotlin.incremental=false
# This builtInKotlin flag was added automatically by Flutter migrator
android.builtInKotlin=false
# This newDsl flag was added automatically by Flutter migrator
android.newDsl=false
