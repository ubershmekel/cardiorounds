<!doctype html>
<html>
  <head>
    <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
    <base href="$FLUTTER_BASE_HREF" />

    <meta charset="UTF-8" />
    <meta content="IE=Edge" http-equiv="X-UA-Compatible" />
    <meta
      name="description"
      content="Cardio Rounds: a heart-rate recording app for treadmill, intervals, and BJJ rounds."
    />

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Cardio Rounds" />
    <link rel="apple-touch-icon" href="icons/Icon-192.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png" />

    <title>Cardio Rounds</title>
    <link rel="manifest" href="manifest.json" />
    <style>
      html,
      body {
        min-height: 100%;
        margin: 0;
        background: #0a0a0a;
      }

      @media (min-width: 620px) {
        body.pages-portrait-frame > flutter-view,
        body.pages-portrait-frame > flt-glass-pane {
          width: 620px !important;
          max-width: 620px !important;
          left: 50% !important;
          right: auto !important;
          transform: translateX(-50%) !important;
          box-shadow:
            0 0 0 1px rgba(255, 255, 255, 0.12),
            0 24px 72px rgba(0, 0, 0, 0.55);
        }
      }
    </style>
  </head>
  <body>
    <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
    <script>
      if (/(^|\/)try(\/|$)/.test(window.location.pathname)) {
        document.body.classList.add("pages-portrait-frame");
      }
    </script>
    <script src="flutter_bootstrap.js" async></script>
  </body>
</html>
