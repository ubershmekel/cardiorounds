# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

vars:
  APP_DART_DEFINES:
    sh: dart app/tool/build_metadata.dart dart-defines

tasks:
  flutter-run:
    desc: Run the app in debug mode
    dir: app
    cmds:
      - flutter run
  run-android:
    desc: Run the app in debug mode on Android
    dir: app
    cmds:
      - flutter run -d emulator
  run-chrome:
    desc: Run the app in debug mode on Chrome
    dir: app
    cmds:
      - flutter run -d chrome
  run-chrome-release:
    desc: Run the app in release mode
    dir: app
    cmds:
      - flutter run --release -d chrome
  build-web:
    desc: Build web with version info
    dir: app
    cmds:
      - flutter build web --release --base-href /didit/ {{.APP_DART_DEFINES}}
  build-android:
    desc: Build Android App Bundle with version info
    dir: app
    cmds:
      - flutter build appbundle --release {{.APP_DART_DEFINES}}
  build-ios:
    desc: Build iOS IPA with version info; does not bump pubspec version
    dir: app
    cmds:
      - flutter build ipa --release {{.APP_DART_DEFINES}}
  test:
    desc: Run all tests (excludes review-only preview image tests)
    dir: app
    cmds:
      - flutter test -r expanded -x preview
  previews:
    desc:
      Regenerate review-only preview images (e.g. HR chart) under test/previews/
    dir: app
    cmds:
      - flutter test -t preview --update-goldens
  format:
    desc: Format Dart code and Prettier-supported project files
    cmds:
      - dart format app
      - npx prettier --write .
  bump:
    desc: Alias for bump-version
    cmds:
      - task: bump-version
  bump-version:
    desc:
      Auto-increment the build number in pubspec.yaml (e.g. 1.0.0+3 -> 1.0.0+4)
    dir: app
    cmds:
      - dart tool/build_metadata.dart bump-version
  gen-art:
    desc: Generate all platform icons and splash screens from logo source files
    dir: app
    cmds:
      - dart run flutter_launcher_icons
      - dart run flutter_native_splash:create
