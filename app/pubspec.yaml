name: cardio
description: "Cardio Rounds: a heart-rate recording app for treadmill, intervals, and BJJ rounds."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  drift: ^2.31.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_blue_plus: ^2.3.3
  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  path_provider: ^2.1.5
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.33.0
  build_runner: ^2.15.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/branding/icon.png"
    background_color: "#0a0a0a"
    theme_color: "#D32F2F"

flutter_native_splash:
  color: "#0a0a0a"
  image: "assets/branding/icon.png"
  android_12:
    color: "#0a0a0a"
    image: "assets/branding/icon.png"
  android: true
  ios: true
  web: false
